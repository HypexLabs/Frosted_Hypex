name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate and grant execute permission for gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper not found. Generating gradle wrapper using runner's preinstalled gradle..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: glassmorphic-playground-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
